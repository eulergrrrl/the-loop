<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Loop">
  <meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>The Loop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --bg2: #1a1d27; --bg3: #222636;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --text: #e8eaf0; --text2: #9499b0; --text3: #5a5f78;
      --rm: 8px; --rl: 12px;
    }
    html, body { height: 100%; background: var(--bg); }
    .app { background: var(--bg); color: var(--text); padding: env(safe-area-inset-top, 1.5rem) 1rem 2rem; padding-top: max(env(safe-area-inset-top), 1.5rem); max-width: 640px; margin: 0 auto; min-height: 100vh; font-family: -apple-system, system-ui, sans-serif; }
    .wordmark { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 1.25rem; }
    .nav { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .nav-btn { flex:1; padding: 8px 0; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border); background: transparent; color: var(--text2); border-radius: var(--rm); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .nav-btn.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }
    .slabel { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: .4rem; }
    .stitle { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: .75rem; }
    .ssub { font-size: 12px; color: var(--text2); font-weight: 500; margin: .75rem 0 .4rem; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
    .bar-name-wrap { display: flex; align-items: center; gap: 5px; width: 110px; flex-shrink: 0; }
    .bar-name { font-size: 13px; color: var(--text); }
    .info-btn { width: 15px; height: 15px; border-radius: 50%; border: 1px solid var(--text3); background: transparent; color: var(--text3); font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .tls { display: flex; gap: 5px; }
    .tl { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .tl.r { background: rgba(220,38,38,.15); border-color: rgba(220,38,38,.2); }
    .tl.y { background: rgba(202,138,4,.15); border-color: rgba(202,138,4,.2); }
    .tl.g { background: rgba(22,163,74,.15); border-color: rgba(22,163,74,.2); }
    .tl.r.sel { border-color: #f87171; background: rgba(220,38,38,.3); }
    .tl.y.sel { border-color: #fbbf24; background: rgba(202,138,4,.3); }
    .tl.g.sel { border-color: #4ade80; background: rgba(22,163,74,.3); }
    .tldot { width: 10px; height: 10px; border-radius: 50%; }
    .tl.r .tldot { background: #f87171; }
    .tl.y .tldot { background: #fbbf24; }
    .tl.g .tldot { background: #4ade80; }
    .reg-divider { border: none; border-top: 0.5px solid var(--border); margin: .75rem 0; }
    .rub-row { display: none; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--rm); padding: 10px 12px; margin-bottom: 6px; }
    .rub-row.open { display: block; }
    .rub-item { display: flex; gap: 9px; margin-bottom: 7px; }
    .rub-item:last-child { margin-bottom: 0; }
    .rub-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .rub-text { font-size: 11px; color: var(--text2); line-height: 1.6; }
    .sit-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: .4rem; }
    .sit-btn { padding: 7px 14px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border); border-radius: var(--rm); cursor: pointer; background: transparent; color: var(--text2); -webkit-tap-highlight-color: transparent; }
    .sit-btn.sel { background: var(--bg3); color: var(--text); border-color: var(--border2); }
    .scan-chip { display: flex; align-items: center; justify-content: space-between; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 12px 14px; margin-bottom: 1rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .chip-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-right: 10px; flex-shrink: 0; }
    .chip-edit { font-size: 11px; color: var(--text3); white-space: nowrap; }
    .pip { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .sit-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: var(--rm); border: 0.5px solid; }
    .compact-steps { display: none; }
    .compact-steps.visible { display: block; }
    .cstep { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 10px 12px; margin-bottom: 8px; }
    .cstep-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .cstep-num { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; }
    .frame-cards-compact { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 6px; }
    .fc { padding: 10px 6px; border-radius: var(--rm); border: 0.5px solid var(--border); background: var(--bg3); text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .fc.active { border-width: 2px; }
    .fc.stabilize.active { border-color: #f87171; background: rgba(220,38,38,.08); }
    .fc.maintain.active  { border-color: #fbbf24; background: rgba(202,138,4,.08); }
    .fc.build.active     { border-color: #4ade80; background: rgba(22,163,74,.08); }
    .fc-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .fc-hint { font-size: 10px; color: var(--text2); line-height: 1.3; }
    .frame-rule { font-size: 10px; color: var(--text3); margin-top: 6px; font-style: italic; }
    .priority-area { margin-top: 8px; padding: 8px 10px; border-radius: var(--rm); border: 0.5px solid var(--border2); background: var(--bg3); }
    .priority-label { color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
    .gmode { font-size: 12px; font-weight: 500; margin-bottom: 6px; }
    .gmode.stabilize { color: #f87171; } .gmode.maintain { color: #fbbf24; } .gmode.build { color: #4ade80; }
    .gitems { display: flex; flex-direction: column; gap: 3px; }
    .gitem { display: flex; align-items: flex-start; gap: 6px; font-size: 11px; color: var(--text2); line-height: 1.4; }
    .gdot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .gdot.stabilize { background: #f87171; } .gdot.maintain { background: #fbbf24; } .gdot.build { background: #4ade80; }
    .do-sum { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.5; }
    .do-sub { font-size: 11px; color: var(--text2); line-height: 1.5; }
    .sit-tag { display: inline-block; margin-top: 6px; padding: 2px 8px; font-size: 10px; font-weight: 500; border-radius: var(--rm); border: 0.5px solid; }
    .note-box { margin-top: 8px; }
    .note-box textarea { width: 100%; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--rm); color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 10px; resize: none; outline: none; line-height: 1.5; }
    .note-box textarea:focus { border-color: var(--border2); }
    .note-box textarea::placeholder { color: var(--text3); }
    .btn-row { display: flex; gap: 6px; margin-top: 6px; }
    .save-note-btn { flex:1; padding: 10px; font-size: 12px; font-weight: 500; border-radius: var(--rm); border: 0.5px solid var(--border2); cursor: pointer; background: transparent; color: var(--text2); -webkit-tap-highlight-color: transparent; }
    .save-note-btn.saved { color: #4ade80; border-color: rgba(22,163,74,.4); }
    .rescan-btn { flex:1; padding: 10px; font-size: 12px; font-weight: 500; border-radius: var(--rm); border: 0.5px solid var(--border); cursor: pointer; background: transparent; color: var(--text2); -webkit-tap-highlight-color: transparent; }
    .restore-bar { font-size: 11px; color: var(--text3); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
    .period-brief { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 12px 14px; margin-bottom: 1.25rem; }
    .brief-header { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .brief-lines { display: flex; flex-direction: column; gap: 4px; }
    .brief-line { font-size: 11px; color: var(--text2); line-height: 1.5; display: flex; gap: 6px; align-items: baseline; }
    .brief-line-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .hist-entry { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 12px 14px; margin-bottom: 10px; }
    .hist-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .hist-date { font-size: 11px; color: var(--text3); }
    .hist-tag { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: var(--rm); border: 0.5px solid; }
    .hist-pips { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
    .hist-note { font-size: 12px; color: var(--text2); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); line-height: 1.6; font-style: italic; }
    .hist-empty { font-size: 13px; color: var(--text3); text-align: center; padding: 3rem 0; }
    .hist-del { font-size: 10px; color: var(--text3); cursor: pointer; margin-left: auto; background: none; border: none; padding: 2px 6px; border-radius: 4px; -webkit-tap-highlight-color: transparent; }
    .trend-section { margin-bottom: 1.5rem; }
    .trend-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 10px; }
    .trend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .trend-name { font-size: 12px; color: var(--text2); width: 90px; flex-shrink: 0; }
    .trend-bars { display: flex; gap: 2px; flex: 1; overflow: hidden; }
    .trend-cell { flex-shrink: 0; width: 10px; height: 14px; border-radius: 2px; }
    .trend-pct { font-size: 10px; color: var(--text3); width: 28px; text-align: right; flex-shrink: 0; }
    .section-toggle { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .stoggle-btn { padding: 5px 14px; font-size: 11px; font-weight: 500; border: 0.5px solid var(--border); border-radius: var(--rm); cursor: pointer; background: transparent; color: var(--text2); -webkit-tap-highlight-color: transparent; }
    .stoggle-btn.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }
    .trend-window { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .tw-btn { padding: 6px 12px; font-size: 11px; border: 0.5px solid var(--border); border-radius: var(--rm); cursor: pointer; background: transparent; color: var(--text3); -webkit-tap-highlight-color: transparent; }
    .tw-btn.active { border-color: var(--border2); color: var(--text2); background: var(--bg3); }
  </style>
</head>
<body>
<div class="app">
  <div class="wordmark">The Loop</div>
  <div class="nav">
    <button class="nav-btn active" id="nav-now" onclick="setMode('now');showView('scan')">Now</button>
    <button class="nav-btn" id="nav-horizon" onclick="setMode('horizon');showView('scan')">Horizon</button>
    <button class="nav-btn" id="nav-hist" onclick="showView('hist')">History</button>
  </div>

  <div id="view-scan">
    <div id="restore-bar" class="restore-bar" style="display:none;">
      <div style="width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0;"></div>
      <span id="restore-text"></span>
      <button onclick="resetAll()" style="margin-left:auto;font-size:11px;background:none;border:none;cursor:pointer;color:var(--text3);text-decoration:underline;">clear</button>
    </div>
    <div id="period-brief" style="display:none;"></div>
    <div id="scan-chip" class="scan-chip" style="display:none;" onclick="expandScan()">
      <span class="chip-label">Scan</span>
      <div id="chip-pips" style="flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap;"></div>
      <span class="chip-edit">edit ↑</span>
    </div>
    <div id="scan-full">
      <div class="slabel">Scan</div>
      <div class="stitle">What's true right now?</div>
      <div id="now-section">
        <div class="ssub">Condition bars</div>
        <div style="height:8px;"></div>
        <div id="bars-cond"></div>
        <hr class="reg-divider">
        <div id="bars-reg"></div>
      </div>
      <div id="horizon-section" style="display:none;">
        <div class="ssub">Areas of focus</div>
        <div style="height:8px;"></div>
        <div id="bars-areas"></div>
      </div>
      <div class="ssub" style="margin-top:1rem;">Situation</div>
      <div class="sit-row" id="sit-row"></div>
    </div>
    <div id="compact-steps" class="compact-steps">
      <div class="cstep">
        <div class="cstep-header"><span class="cstep-num">Frame</span></div>
        <div class="frame-cards-compact">
          <div class="fc stabilize" id="fc-stabilize" onclick="selectFrame('stabilize')"><div class="fc-name">Stabilize</div><div class="fc-hint">Recover, reduce load</div></div>
          <div class="fc maintain" id="fc-maintain" onclick="selectFrame('maintain')"><div class="fc-name">Maintain</div><div class="fc-hint">Steady, no heroics</div></div>
          <div class="fc build" id="fc-build" onclick="selectFrame('build')"><div class="fc-name">Build</div><div class="fc-hint">Deep work, big moves</div></div>
        </div>
        <div class="frame-rule" id="frame-rule"></div>
        <div id="priority-area-box" style="display:none;"></div>
      </div>
      <div class="cstep">
        <div class="cstep-header"><span class="cstep-num">Choose</span></div>
        <div id="gbox"><div style="font-size:12px;color:var(--text3);">Select a mode above.</div></div>
      </div>
      <div class="cstep">
        <div class="cstep-header"><span class="cstep-num">Do</span></div>
        <div id="do-box"><div class="do-sum" style="color:var(--text3);font-weight:400;font-size:12px;">Complete the steps above.</div></div>
        <div class="note-box">
          <textarea id="note-input" rows="2" placeholder="Add a note to this scan (optional)..."></textarea>
          <div class="btn-row">
            <button class="save-note-btn" id="save-note-btn" onclick="saveNote()">Save note</button>
            <button class="rescan-btn" onclick="resetAll()">Re-scan ↺</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="view-hist" style="display:none;">
    <div class="section-toggle">
      <button class="stoggle-btn" id="ht-log" onclick="setHistTab('log')">Log</button>
      <button class="stoggle-btn active" id="ht-trends" onclick="setHistTab('trends')">Trends</button>
    </div>
    <div id="hist-log" style="display:none;"></div>
    <div id="hist-trends"></div>
  </div>
</div>

<script>
const SK='loop_v1',HK='loop_hist_v1';
const NOW_BARS=['Rest','Fuel','Energy','Focus','Social','Joy'];
const REG_BAR='Regulation';
const HORIZON_AREAS=['Work','Health','Relationships','Growth','Admin'];
const SITS=['Calm','Raid','Fire','Drop','Recovery'];
const CM={r:'#f87171',y:'#fbbf24',g:'#4ade80'};
const FC2={stabilize:{c:'#f87171',bg:'rgba(220,38,38,.15)',bd:'rgba(220,38,38,.4)'},maintain:{c:'#fbbf24',bg:'rgba(202,138,4,.15)',bd:'rgba(202,138,4,.4)'},build:{c:'#4ade80',bg:'rgba(22,163,74,.15)',bd:'rgba(22,163,74,.4)'}};
const SM={Calm:{c:'#4ade80',bg:'rgba(22,163,74,.15)',bd:'rgba(22,163,74,.4)'},Raid:{c:'#fbbf24',bg:'rgba(202,138,4,.15)',bd:'rgba(202,138,4,.4)'},Fire:{c:'#f87171',bg:'rgba(220,38,38,.15)',bd:'rgba(220,38,38,.4)'},Drop:{c:'#60a5fa',bg:'rgba(59,130,246,.15)',bd:'rgba(59,130,246,.4)'},Recovery:{c:'#a78bfa',bg:'rgba(139,92,246,.15)',bd:'rgba(139,92,246,.4)'}};

const RUB={
  Rest:{g:'Adequately rested. You can think and function without sleep being the main issue.',y:'A bit tired or under-rested. Still functional, but your resilience is thinner than usual.',r:'Fatigue is a real factor today. Foggy, brittle, or running on fumes — let this shape the plan.'},
  Fuel:{g:'Fed, hydrated, physically steady. No crash incoming.',y:'A little off — hungry, dehydrated, or running on comfort food. Fine for now, but worth addressing.',r:'Under-fuelled or using food to cope with something. Either way, your body isn\'t in a good state. This matters.'},
  Energy:{g:'Usable drive. Things feel doable and you have some margin.',y:'Some capacity, but not much room to push. Be selective about where you spend it.',r:'Flat, drained, or brittle. Even routine things feel heavier than they should. Plan accordingly.'},
  Focus:{g:'You can get into a task and stay there. Deep or complex work is available.',y:'Workable, but concentration is patchy. Lean toward shorter or more concrete tasks.',r:'Scattered or foggy. Hard to hold a thread. Complex work will fight you today.'},
  Social:{g:'Socially okay — connection feels accessible rather than costly.',y:'A little peopled-out or disconnected. Handle social demands with care.',r:'Socially depleted or brittle. Engagement takes more than you have right now.'},
  Joy:{g:'Some lightness or pleasure is present. Not everything feels like obligation.',y:'Joy is low. Mostly running on duty and habit.',r:'Everything feels like extraction. Flat, grim, or going through the motions. Worth noting.'},
  Regulation:{g:'Emotionally steady. You can think clearly, respond rather than react, be present without the nervous system hijacking the wheel.',y:'Something\'s activated or you\'re running a bit flat. Functional but working harder than baseline to stay steady. Handle sensitive things with care.',r:'Flooded, activated, or shut down. Heart racing, jaw tight, thoughts spiraling — or completely blank and checked out. Both count as red. Not the moment for hard conversations or decisions that matter. Regulate first.'},
  Work:{g:'Core responsibilities handled. Demanding but manageable — no fires being ignored.',y:'Uneven. Some drift or backlog accumulating. Work is starting to create background stress.',r:'Behind, avoidant, or under siege. Something important is being missed or indefinitely deferred.'},
  Health:{g:'Basics are intact — sleep, food, movement, recovery. Body feels supported.',y:'One or two basics are slipping. Still functional, but running thinner than is sustainable.',r:'Genuinely depleted — under-slept, under-moved, or leaning hard on food as a coping mechanism.'},
  Relationships:{g:'Feeling connected. The important relationships in your life are getting enough attention.',y:'A bit withdrawn or thin. Present enough but not really there.',r:'Withdrawn or strained — or both. The distance is noticeable, even if no one\'s saying it yet.'},
  Growth:{g:'Learning, creating, or moving toward something that matters. This part of life has air.',y:'Growth is mostly intention right now. The math, the minis, the creative stuff keeps getting bumped.',r:'Flatlined. Everything is going to maintenance and obligation. The meaningful stuff has disappeared.'},
  Admin:{g:'Practical life is under control. Logistics, finances, and chores aren\'t creating hidden drag.',y:'Some backlog building up. The friction is manageable but increasing.',r:'Practical life is messy enough to be genuinely stressful. Admin is stealing mental bandwidth.'},
};

function getReg(){return(state.bars||{})[REG_BAR]||null;}

function getNowGuidance(frame,priority){
  const reg=getReg()||'g';
  const G={
    stabilize:{
      base:{g:['Basics only — your kid, your partner, your body','Smallest next action that reduces the most pressure','Capture what surfaces; rest is a legitimate move','Nothing heroic today'],y:['Basics only — and notice you\'re not quite steady','Smallest possible action — your margin is thin','Capture what surfaces; don\'t try to process it now','Rest is a legitimate choice'],r:['You\'re dysregulated. That\'s the whole situation right now.','Alone time and low demand — that\'s the prescription','Movement if you can — a walk, a drive, being outside','Don\'t make decisions. Don\'t have hard conversations. Just regulate.']},
      Work:{g:['Find the one open work loop causing the most pressure and close it','Don\'t try to catch up — stop the bleed, then step back','One work action maximum'],y:['One very small work action only — you\'re not steady enough for more','Close the most urgent loop; capture everything else','Don\'t push into anything complex'],r:['Work is offline right now. That\'s correct, not failure.','The work will be there when you\'re steadier','Don\'t make work decisions while dysregulated — they\'re suspect','Regulate first. Everything else waits.']},
      Health:{g:['Body first — sleep, water, or actual food (not comfort food)','If Fuel is red, notice whether you\'re eating to cope rather than to fuel','A lift or a walk is valid if the energy is genuinely there'],y:['Body first — and notice the urge to comfort eat if it\'s there','Something real to eat or drink before anything else','Gentle movement if you have it'],r:['Body and nervous system both need attention right now','Real food — not comfort food, even though that\'s what it wants','Movement can help regulation — a walk, even a short one','Don\'t demand more from your body than it has today']},
      Relationships:{g:['You\'re probably withdrawing right now — worth naming to yourself','You don\'t have to fix anything today','Go home. Be in the same room. That\'s enough for now.','Your kid doesn\'t need a performance. Just your presence.'],y:['You\'re a bit withdrawn and not quite steady — a difficult combination','Don\'t go in hot. Don\'t force connection either.','Physical presence without pressure — be nearby, be quiet, be there','Your kid especially doesn\'t need you to perform. Just show up.'],r:['You\'re dysregulated and things may be strained. Don\'t go in hot.','The repair can\'t happen from this state — it\'ll make things worse','Get regulated first: alone time, movement, music, being outside','When you\'re steadier, then you can think about what home looks like']},
      Growth:{g:['Growth pauses today. Rest is what the system needs.','The minis, the math, the games — they\'ll wait','Capture anything that surfaces'],y:['Growth is mostly off today — but low-stakes tactile stuff might be okay','Handling minis, something with your hands, low-demand and absorbing','Not deep math. Not anything that requires full presence.'],r:['Demanding creative work will fight you right now — don\'t force it','Low-stakes tactile work might actually help regulate: minis, something physical','Or just rest. Both are valid.']},
      Admin:{g:['One admin item that stops something from escalating','Not tidy — just contained','Capture the rest, process later'],y:['One small admin action — something routine and low-stakes','Routine tasks can actually be steadying when you\'re not quite regulated','Nothing that requires big decisions'],r:['Routine admin might actually help right now — it\'s low-demand and completable','Pick something small and mechanical, not anything requiring decisions','Or skip it entirely and just regulate. Both are fine.']},

function isScanComplete(){
  if(mode==='now') return NOW_BARS.every(b=>state.bars[b])&&!!state.bars[REG_BAR]&&!!state.sit;
  return HORIZON_AREAS.every(a=>state.areas[a])&&!!state.sit;
}
function getSuggestedFrame(){
  if(mode==='now'){
    const reg=getReg();
    if(reg==='r') return 'stabilize';
    const vals=NOW_BARS.map(b=>(state.bars||{})[b]).filter(Boolean);
    const red=vals.filter(v=>v==='r').length,yel=vals.filter(v=>v==='y').length;
    if(red>=2) return 'stabilize';
    if(reg==='y'||red===1||yel>=3) return 'maintain';
    return 'build';
  }
  const vals=Object.values(state.areas||{});
  const red=vals.filter(v=>v==='r').length,yel=vals.filter(v=>v==='y').length;
  return red>=2?'stabilize':(red===1||yel>=3)?'maintain':'build';
}
function getSuggestedPriority(){
  if(mode==='now') return null;
  const areas=state.areas||{};const order=['r','y','g'];let best=null,bestRank=99;
  HORIZON_AREAS.forEach(a=>{const rank=order.indexOf(areas[a]);if(rank<bestRank){bestRank=rank;best=a;}});
  return best;
}
function getFrameRuleText(){

    const vals=NOW_BARS.map(b=>(state.bars||{})[b]).filter(Boolean);
    const red=vals.filter(v=>v==='r').length,yel=vals.filter(v=>v==='y').length;
    if(red>=2) return `${red} bars in red → Stabilize suggested`;
    if(reg==='y') return 'Regulation limited → Maintain suggested';
    if(red===1||yel>=3) return 'Limited capacity → Maintain suggested';
    return 'Conditions good → Build suggested';
  }
  const vals=Object.values(state.areas||{});
  const red=vals.filter(v=>v==='r').length,yel=vals.filter(v=>v==='y').length;

function buildPeriodBrief(){

  const cutoff=Date.now()-(30*24*60*60*1000);
  const recent=history.filter(e=>e.ts>=cutoff);
  if(recent.length<3){el.style.display='none';return;}
  const nowEntries=recent.filter(e=>e.mode==='now');
  const horizonEntries=recent.filter(e=>e.mode==='horizon');
  const lines=[];
  if(nowEntries.length>=2){
    const fc4={};nowEntries.forEach(e=>{if(e.frame)fc4[e.frame]=(fc4[e.frame]||0)+1;});
    const dom=Object.entries(fc4).sort((a,b)=>b[1]-a[1])[0];
    if(dom){const pct=Math.round(dom[1]/nowEntries.length*100);lines.push({col:FC2[dom[0]].c,text:`Mostly <strong>${dom[0]}</strong> in Now scans (${pct}% of last 30 days)`});}
  }
  if(nowEntries.length>=2){
    const struggling=[];
    [...NOW_BARS,REG_BAR].forEach(b=>{
      const vals=nowEntries.map(e=>(e.bars||{})[b]).filter(Boolean);if(!vals.length)return;
      const ry=vals.filter(v=>v==='r'||v==='y').length/vals.length;
      if(ry>=0.6)struggling.push({name:b,redPct:Math.round(vals.filter(v=>v==='r').length/vals.length*100)});
    });
    if(struggling.length){const names=struggling.map(s=>s.redPct>40?`<strong style="color:#f87171;">${s.name}</strong>`:`<strong style="color:#fbbf24;">${s.name}</strong>`).join(', ');lines.push({col:'#9499b0',text:`Condition bars often limited: ${names}`});}
  }
  if(horizonEntries.length>=1){
    const neglected=[];
    HORIZON_AREAS.forEach(a=>{
      const vals=horizonEntries.map(e=>(e.areas||{})[a]).filter(Boolean);if(!vals.length)return;
      const rp=vals.filter(v=>v==='r').length/vals.length,yp=vals.filter(v=>v==='y').length/vals.length;
      if(rp>=0.5)neglected.push({name:a,severity:'r'});else if(yp>=0.6)neglected.push({name:a,severity:'y'});
    });
    if(neglected.length){const names=neglected.map(n=>`<strong style="color:${CM[n.severity]};">${n.name}</strong>`).join(', ');lines.push({col:'#9499b0',text:`Areas consistently slipping: ${names}`});}
  }
  if(recent.length>=3){
    const sc={};recent.forEach(e=>{if(e.sit&&e.sit!=='Calm')sc[e.sit]=(sc[e.sit]||0)+1;});
    const top=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0];

  }
  if(!lines.length){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=`<div class="period-brief"><div class="brief-header">Last 30 days</div><div class="brief-lines">${lines.map(l=>`<div class="brief-line"><div class="brief-line-dot" style="background:${l.col};margin-top:5px;"></div><span>${l.text}</span></div>`).join('')}</div></div>`;
}

      stabilize:{Work:{items:['Find the one work commitment creating the most pressure and address it','Don\'t try to catch up — stop the bleed','No new projects or commitments this period','Capture everything else; actually leave it in your system']},Health:{items:['Sleep and recovery are the actual priority this period','Real food — not comfort food as a coping mechanism','Don\'t skip basics: food, movement, rest','Health before productivity']},Relationships:{items:['You\'re probably withdrawing — that\'s worth noticing without judgment','You don\'t have to fix anything this period','Go home when you\'re regulated enough to be present','Your wife and kid don\'t need a performance — just you, in the room, not distant']},Growth:{items:['Growth pauses — that\'s okay, not failure','Protect any existing creative habit, even minimally','Capture ideas; come back to them later','Rest is part of the recovery']},Admin:{items:['The admin item you\'ve been putting off is probably the one to do','Stop the bleed — not a full tidy','Smallest action to prevent escalation','The rest goes back in the system']},default:{items:['Protect the basics across all areas','No expansion — stabilise what exists','Identify what\'s most destabilising and address that first','Capture everything else']}},
      maintain:{Work:{items:['Core work — curriculum, consult, what\'s in your system','One focused block in your best hours','Protect existing commitments; don\'t expand scope']},Health:{items:['Maintain the routine — lift, cook real food, sleep','If Fuel is yellow, check whether comfort food is doing extra work','Consistency is the job — shorter sessions still count']},Relationships:{items:['You might be a little withdrawn — notice it without spiraling','Physical presence is a form of connection even when you\'re not fully open','Be in the room. Sit near your wife. Do a thing with your kid.','You don\'t have to be emotionally available — just not absent']},Growth:{items:['Protect one slot for something that\'s actually yours — math, minis, DnD, a game session','These aren\'t extras — they\'re part of what makes you functional','If it keeps getting bumped, that\'s a planning problem']},Admin:{items:['Clear one or two things — ideally the ones that have been sitting','Maintenance mode, not overhaul','Set up one thing that reduces future friction']},default:{items:['Hold the line across all areas','Routine and consistency over ambition','No new commitments without something coming off','Protect what\'s already working']}},
      build:{Work:{items:['Go deep on the curriculum work or consult project that matters most','Block the time — protect it like you mean it','One substantial output this period']},Health:{items:['Build something sustainable — a lift cycle, a real meal habit, an actual routine','If Fuel is chronically off, this is the window to address the food thing properly','Something that compounds over time, not just today\'s checkbox']},Relationships:{items:['This is a window — use it to actually be present, not just physically nearby','Presence and groundedness, not performance','A real conversation with your wife. Real floor time with your kid.','You don\'t have to go all in — but lean in a little']},Growth:{items:['Go deep on something that\'s actually yours — deep math, minis, home, a real creative session','Protect this time like work time','Start the thing. Finish the thing. It counts.']},Admin:{items:['Sort the backlog properly — not just patch it','Set up systems that remove future drag','Tackle the thing you\'ve been putting off — this is the window']},default:{items:['This is a build period — use it intentionally','Pick one area and go deeper','Ambitious and scoped — what actually gets done this period?']}},
    };
    const d=HGUID[state.frame][priority]||HGUID[state.frame].default;
    const label=state.priority?`${state.frame.charAt(0).toUpperCase()+state.frame.slice(1)} · ${state.priority}`:`${state.frame.charAt(0).toUpperCase()+state.frame.slice(1)}`;
    box.innerHTML=`<div class="gmode ${state.frame}">${label}</div><div class="gitems">${d.items.map(i=>`<div class="gitem"><div class="gdot ${state.frame}"></div>${i}</div>`).join('')}</div>`;
  }
}
function renderDo(){
  const box=document.getElementById('do-box');
  if(!state.frame){box.innerHTML='<div class="do-sum" style="color:var(--text3);font-weight:400;font-size:12px;">Complete the steps above.</div>';return;}
  if(mode==='now'){
    const lh=history.find(e=>e.mode==='horizon')||null;
    const priority=lh?lh.priority:null;
    box.innerHTML=getNowDo(state.frame,state.sit,priority);
  } else {
    const fc=FC2[state.frame],modeWord=state.frame.charAt(0).toUpperCase()+state.frame.slice(1);
    const sit=state.sit||'Calm',sitM=SM[sit];
    const intentionText=state.priority?`This is a <strong style="color:${fc.c};">${modeWord}</strong> period. Priority area: <strong style="color:${CM[state.areas[state.priority]||'y']};">${state.priority}</strong>.`:`This is a <strong style="color:${fc.c};">${modeWord}</strong> period.`;
    const planNudge=state.frame==='build'?'Take this to your planner. What\'s the next action on your priority project?':state.frame==='maintain'?'Take this to your planner. Protect your routines and hold the line.':'Take this to your planner. What\'s the one thing most destabilising right now?';
    const tag=state.sit&&state.sit!=='Calm'?`<span class="sit-tag" style="color:${sitM.c};background:${sitM.bg};border-color:${sitM.bd};">${sit}</span>`:'';
    box.innerHTML=`<div class="do-sum">${intentionText}</div><div class="do-sub">${planNudge}${tag?'<br>'+tag:''}</div>`;
  }
}
function resetAll(){
  state={bars:{},areas:{},sit:null,frame:null,priority:null};currentLogId=null;
  document.getElementById('restore-bar').style.display='none';
  document.getElementById('frame-rule').textContent='';
  document.getElementById('priority-area-box').style.display='none';
  document.getElementById('note-input').value='';
  document.getElementById('save-note-btn').textContent='Save note';
  document.getElementById('save-note-btn').className='save-note-btn';
  ['stabilize','maintain','build'].forEach(m2=>{document.getElementById('fc-'+m2).className='fc '+m2;});
  expandScan();buildAllBars();renderGuidance();renderDo();buildPeriodBrief();save();
}
function setHistTab(t){
  histTab=t;
  document.getElementById('ht-log').className='stoggle-btn'+(t==='log'?' active':'');
  document.getElementById('ht-trends').className='stoggle-btn'+(t==='trends'?' active':'');
  document.getElementById('hist-log').style.display=t==='log'?'':'none';
  document.getElementById('hist-trends').style.display=t==='trends'?'':'none';
  renderHistory();
}
function renderHistory(){if(histTab==='log')renderLog();else renderTrends();}
function formatDate(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function getWindowedHistory(){return history.filter(e=>e.ts>=Date.now()-(trendDays*24*60*60*1000));}
function renderLog(){
  const el=document.getElementById('hist-log');
  const entries=getWindowedHistory();
  if(!entries.length){el.innerHTML='<div class="hist-empty">Colony log empty.</div>';return;}
  el.innerHTML='';
  entries.forEach(e=>{
    const isNow=e.mode==='now';
    const items=isNow?[...NOW_BARS,REG_BAR]:HORIZON_AREAS;
    const sk=isNow?'bars':'areas';
    const vals=items.map(b=>(e[sk]||{})[b]||'');
    const pips=vals.map(v=>`<div class="pip" style="background:${CM[v]||'#5a5f78'};"></div>`).join('');
    const sm2=e.sit?SM[e.sit]:null;
    const sitBadge=e.sit?`<span class="hist-tag" style="color:${sm2.c};background:${sm2.bg};border-color:${sm2.bd};">${e.sit}</span>`:'';
    const fc3=e.frame?FC2[e.frame]:null;
    const frameBadge=e.frame?`<span class="hist-tag" style="color:${fc3.c};background:${fc3.bg};border-color:${fc3.bd};">${e.frame}</span>`:'';
    const modeTag=`<span style="font-size:10px;color:var(--text3);">${isNow?'now':'horizon'}</span>`;
    const priTag=e.priority?`<span style="font-size:10px;color:var(--text3);">▸ ${e.priority}</span>`:'';
    const div=document.createElement('div');div.className='hist-entry';
    div.innerHTML=`<div class="hist-meta"><span class="hist-date">${formatDate(e.ts)}</span>${modeTag}${frameBadge}${sitBadge}${priTag}<button class="hist-del" onclick="deleteEntry(${e.id})">✕</button></div><div class="hist-pips">${pips}</div>${e.note?`<div class="hist-note">${e.note}</div>`:''}`;
    el.appendChild(div);
  });
}
function deleteEntry(id){history=history.filter(e=>e.id!==id);saveHistory();renderHistory();}
function renderTrends(){
  const el=document.getElementById('hist-trends');el.innerHTML='';
  const wp=document.createElement('div');wp.className='trend-window';
  [30,90,180].forEach(d=>{
    const b=document.createElement('button');b.className='tw-btn'+(trendDays===d?' active':'');b.textContent=d+'d';
    b.addEventListener('click',()=>{trendDays=d;renderTrends();});wp.appendChild(b);
  });
  el.appendChild(wp);
  const entries=getWindowedHistory();
  if(entries.length<2){const empty=document.createElement('div');empty.className='hist-empty';empty.textContent='Not enough scans in this window yet.';el.appendChild(empty);return;}
  function makeSection(title,items,dk,filterMode){
    const src=filterMode?entries.filter(e=>e.mode===filterMode):entries;if(!src.length)return;
    const sec=document.createElement('div');sec.className='trend-section';sec.innerHTML=`<div class="trend-label">${title}</div>`;
    let any=false;
    items.forEach(name=>{
      const vals=src.map(e=>(e[dk]||{})[name]).filter(Boolean);if(!vals.length)return;any=true;
      const row=document.createElement('div');row.className='trend-row';
      const cells=vals.slice(-60).map(v=>`<div class="trend-cell" style="background:${CM[v]||'#333'};opacity:0.85;"></div>`).join('');
      const rp=Math.round(vals.filter(v=>v==='r').length/vals.length*100);
      row.innerHTML=`<span class="trend-name">${name}</span><div class="trend-bars">${cells}</div><span class="trend-pct">${rp}%</span>`;
      sec.appendChild(row);
    });
    if(any)el.appendChild(sec);
  }
  makeSection('Condition bars — Now',[...NOW_BARS,REG_BAR],'bars','now');
  makeSection('Areas of focus — Horizon',HORIZON_AREAS,'areas','horizon');
  const fc4={};entries.forEach(e=>{if(e.frame)fc4[e.frame]=(fc4[e.frame]||0)+1;});
  const tot=Object.values(fc4).reduce((a,b)=>a+b,0);
  if(tot){
    const sec3=document.createElement('div');sec3.className='trend-section';sec3.innerHTML='<div class="trend-label">Mode distribution</div>';
    ['stabilize','maintain','build'].forEach(f=>{
      const count=fc4[f]||0,pct=Math.round(count/tot*100),fc5=FC2[f];
      sec3.innerHTML+=`<div class="trend-row"><span class="trend-name" style="color:${fc5.c};">${f}</span><div style="flex:1;background:var(--bg3);border-radius:3px;height:10px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${fc5.c};opacity:0.7;"></div></div><span class="trend-pct">${pct}%</span></div>`;
    });
    el.appendChild(sec3);
  }
  const sc={};entries.forEach(e=>{if(e.sit)sc[e.sit]=(sc[e.sit]||0)+1;});
  const stot=Object.values(sc).reduce((a,b)=>a+b,0);
  if(stot){
    const sec4=document.createElement('div');sec4.className='trend-section';sec4.innerHTML='<div class="trend-label">Situation breakdown</div>';
    SITS.forEach(s=>{
      if(!sc[s])return;const pct=Math.round(sc[s]/stot*100),m2=SM[s];
      sec4.innerHTML+=`<div class="trend-row"><span class="trend-name" style="color:${m2.c};">${s}</span><div style="flex:1;background:var(--bg3);border-radius:3px;height:10px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${m2.c};opacity:0.7;"></div></div><span class="trend-pct">${pct}%</span></div>`;
    });
    el.appendChild(sec4);
  }
  const prio={};entries.filter(e=>e.priority).forEach(e=>{prio[e.priority]=(prio[e.priority]||0)+1;});
  const ptot=Object.values(prio).reduce((a,b)=>a+b,0);
  if(ptot){
    const sec5=document.createElement('div');sec5.className='trend-section';sec5.innerHTML='<div class="trend-label">Priority area — Horizon</div>';
    HORIZON_AREAS.forEach(a=>{
      if(!prio[a])return;const pct=Math.round(prio[a]/ptot*100);
      sec5.innerHTML+=`<div class="trend-row"><span class="trend-name">${a}</span><div style="flex:1;background:var(--bg3);border-radius:3px;height:10px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:var(--text3);opacity:0.7;"></div></div><span class="trend-pct">${pct}%</span></div>`;
    });
    el.appendChild(sec5);
  }
}
function formatAgo(ts){
  if(!ts)return'';const d=Math.floor((Date.now()-ts)/1000);
  if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';
}
function init(){
  try{
    const r=localStorage.getItem(SK);
    if(r){
      const d=JSON.parse(r);
      if(d&&d.state){
        mode=d.mode||'now';state=d.state;
        document.getElementById('restore-text').textContent=`Restored from last session — ${formatAgo(d.savedAt)}`;
        document.getElementById('restore-bar').style.display='flex';
      }
    }
    const h=localStorage.getItem(HK);
    if(h) history=JSON.parse(h)||[];
  }catch(e){}
  syncNav();buildAllBars();buildPeriodBrief();
  if(state.frame)selectFrame(state.frame,true);
  checkAndCollapse();
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}
init();
</script>
